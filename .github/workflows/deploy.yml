name: Déploiement VPS (API)

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      # La clé DEPLOY_SSH_KEY est restreinte côté serveur (authorized_keys, option
      # command=) : quelle que soit la commande envoyée ici, le serveur exécute
      # toujours /usr/local/bin/deploy-api.sh (git pull + pm2 restart cabinet-api).
      # Ce script ne touche jamais à config.py (exclu du dépôt Git).
      - name: Déployer sur le VPS
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          script: echo "déploiement déclenché"

      - name: Vérifier que l'API répond
        run: |
          sleep 5
          response=$(curl -sf https://cabinet-babamouneissa.com/api/)
          echo "$response"
          echo "$response" | grep -Eq '"status":\s*"ok"'
